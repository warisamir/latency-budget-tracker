spring:
  application:
    name: latency-budget-tracker

  datasource:
    url: jdbc:h2:mem:latencydb
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: LatencyTrackerPool

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  security:
    user:
      name: admin
      password: admin123

# Actuator - Full exposure for local development
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,env,configprops
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: development
  tracing:
    sampling:
      probability: 1.0

# OpenTelemetry - Optional for local development
otel:
  exporter:
    otlp:
      endpoint: http://localhost:4317
      protocol: grpc
  service:
    name: latency-budget-tracker
  traces:
    exporter: none
  metrics:
    exporter: none
  logs:
    exporter: none

# Latency Budgets (ms)
latency:
  budget:
    authentication: 20
    validation: 10
    business-logic: 50
    cache-access: 10
    database-query: 40
    response-serialization: 5
    total: 135
  alerting:
    cooldown-minutes: 5
    deduplication-window-minutes: 10
  regression:
    check-interval-ms: 300000
    thresholds:
      low: 5.0
      medium: 10.0
      high: 20.0
      critical: 50.0

# Resilience4j - Development settings
resilience4j:
  circuitbreaker:
    instances:
      redis:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      database:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 10s

# Logging - Verbose for development
logging:
  level:
    root: INFO
    com.coinbase.latencytracker: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: WARN
    org.springframework.data: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}/%X{spanId}] %-5level %logger{36} - %msg%n"

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always
    include-exception: true
