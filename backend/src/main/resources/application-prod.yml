spring:
  application:
    name: latency-budget-tracker

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/latencydb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:15}
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: LatencyTrackerPool
      auto-commit: true

  jpa:
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
          fetch_size: 50
        order_inserts: true
        order_updates: true
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      ssl: ${REDIS_SSL:false}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  security:
    user:
      name: ${SECURITY_USER:admin}
      password: ${SECURITY_PASSWORD:changeme123!}

# Actuator - Production-safe exposure
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: production
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}

# OpenTelemetry - Optional external tracing
otel:
  exporter:
    otlp:
      endpoint: ${OTEL_ENDPOINT:http://localhost:4317}
      protocol: grpc
  service:
    name: latency-budget-tracker
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:none}
  metrics:
    exporter: ${OTEL_METRICS_EXPORTER:none}
  logs:
    exporter: ${OTEL_LOGS_EXPORTER:none}

# Latency Budgets (ms)
latency:
  budget:
    authentication: 20
    validation: 10
    business-logic: 50
    cache-access: 10
    database-query: 40
    response-serialization: 5
    total: 135
  alerting:
    cooldown-minutes: 5
    deduplication-window-minutes: 10
  regression:
    check-interval-ms: 300000
    thresholds:
      low: 5.0
      medium: 10.0
      high: 20.0
      critical: 50.0

# Resilience4j - Production configuration
resilience4j:
  circuitbreaker:
    instances:
      redis:
        registerHealthIndicator: true
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 2s
        eventConsumerBufferSize: 10
      database:
        registerHealthIndicator: true
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        failureRateThreshold: 60
        waitDurationInOpenState: 15s

# Logging - Production-grade
logging:
  level:
    root: INFO
    com.coinbase.latencytracker: ${LOG_LEVEL:INFO}
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.springframework.data: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSS'Z'} [%thread] [%X{traceId}/%X{spanId}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd'T'HH:mm:ss.SSS'Z'} [%thread] [%X{traceId}/%X{spanId}] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:./logs/latency-budget-tracker.log}
    max-size: 100MB
    max-history: 10
    total-size-cap: 1GB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# CORS Configuration - Allow cross-origin requests from frontend
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
