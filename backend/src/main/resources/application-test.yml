spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6370  # overridden by Testcontainers

otel:
  traces:
    exporter: none
  metrics:
    exporter: none

management:
  tracing:
    sampling:
      probability: 0.0

latency:
  alerting:
    cooldown-minutes: 0
    deduplication-window-minutes: 0
