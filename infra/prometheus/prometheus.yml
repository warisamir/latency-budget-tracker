global:
  scrape_interval:     15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:

  # Spring Boot app — Micrometer Prometheus endpoint
  - job_name: latency-budget-tracker
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [app:8080]
    scrape_interval: 5s

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # Redis exporter (optional, add if you deploy redis_exporter)
  # - job_name: redis
  #   static_configs:
  #     - targets: [redis-exporter:9121]
